name: Update publications from OpenAlex

on:
  schedule:
    - cron: "0 7 * * 1"   # every Monday 07:00 UTC
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch OpenAlex works
        run: python scripts/update_publications.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/publications.json
          if git diff --staged --quiet; then
            echo "No changes to publications.json."
          else
            git commit -m "chore(publications): refresh from OpenAlex"
            git push
          fi
